<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebra Cabeça - Helenio</title>
    <style>
        :root {
            --ouro: #D4AF37;
            --grad-ouro: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --bg: #0a0f1c;
            --card: #141b2d;
            --borda: #2a3550;
            --verde: #10b981;
            --roxo: #7c3aed;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at top, #1a2340, #05070d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px 10px;
        }
        .container {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            padding: 18px;
            border-radius: 16px;
            border: 1.5px solid var(--borda);
            box-shadow: 0 20px 50px -10px rgba(0,0,0,.7);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute; inset: -2px;
            border-radius: 18px;
            background: var(--grad-ouro);
            z-index: -1; opacity: .3; filter: blur(6px);
        }

        /* TÍTULO PEQUENO E NA MEDIDA */
        header h1 {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--grad-ouro);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,.8));
            margin-bottom: 15px;
            line-height: 1.3;
        }
        @media (min-width: 500px) { header h1 { font-size: 1.45rem; } }

        .controles { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .linha { display: flex; gap: 8px; flex-wrap: wrap; }
        select, button {
            flex: 1; min-width: 100px;
            padding: 10px 12px;
            border-radius: 9px;
            border: 1.5px solid var(--borda);
            background: #1e2942;
            color: #fff;
            font-weight: 700;
            font-size: .88rem;
            cursor: pointer;
            transition: all .18s;
        }
        select:hover, button:hover:not(:disabled) { border-color: var(--ouro); transform: translateY(-1px); }
        button:disabled { opacity: .5; cursor: not-allowed; }
        .btn-ouro { background: var(--grad-ouro); color: #1a0f00; border-color: #AA771C; }
        .btn-resolver { background: linear-gradient(135deg, #7c3aed, #4f46e5); border-color: #8b5cf6; }
        .btn-resolver:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(139,92,246,.45); }
        .btn-resolver.ocupado { animation: pulse 1s infinite; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(139,92,246,.6); }
            50% { box-shadow: 0 0 0 10px rgba(139,92,246,0); }
        }
        .upload { position: relative; flex: 1; min-width: 140px; }
        .upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .status {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,.35);
            padding: 10px 14px;
            border-radius: 9px;
            margin-bottom: 14px;
            font-size: .88rem;
            border: 1px solid rgba(212,175,55,.15);
            flex-wrap: wrap; gap: 6px;
        }
        .status span { font-weight: 800; }
        #st { color: var(--ouro); }
        #st.ok { color: var(--verde); }
        #st.res { color: #a78bfa; }

        #area {
            width: 100%;
            aspect-ratio: 1/1;
            background: #050810;
            border-radius: 12px;
            overflow: hidden;
            border: 2.5px solid;
            border-image: var(--grad-ouro) 1;
        }
        #tab {
            width: 100%; height: 100%;
            display: grid; gap: 2px;
            background: var(--borda);
        }

        /* PEÇAS COM NÚMERO (SEMPRE VISÍVEL) */
        .peca {
            background-repeat: no-repeat;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: transform .12s, filter .12s;
        }
        .peca::after {
            content: attr(data-n);
            position: absolute;
            right: 3px; bottom: 2px;
            font-size: clamp(.55rem, 2vw, .85rem);
            font-weight: 900;
            color: #fff;
            text-shadow:
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0 2px 4px rgba(0,0,0,.8);
            line-height: 1;
            pointer-events: none;
            opacity: .9;
        }
        .peca:hover:not(.vazia) { filter: brightness(1.18); transform: scale(.97); }
        .peca.vazia { background: #050810 !important; cursor: default; }
        .peca.vazia::after { content: ''; }
        .peca.mexe { animation: mexe .14s ease; }
        @keyframes mexe {
            0% { transform: scale(1); }
            50% { transform: scale(.9); filter: brightness(1.3); }
            100% { transform: scale(1); }
        }

        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(5,8,16,.92);
            justify-content: center; align-items: center;
            z-index: 100; padding: 16px;
            backdrop-filter: blur(5px);
        }
        .modal .cx {
            background: var(--card);
            padding: 28px 24px;
            border-radius: 16px;
            text-align: center;
            max-width: 360px; width: 100%;
            border: 2px solid; border-image: var(--grad-ouro) 1;
            animation: aparece .35s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes aparece { from { transform: scale(.7); opacity: 0; } }
        .modal h2 {
            background: var(--grad-ouro);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.7rem; margin-bottom: 8px;
        }
        .modal p { color: #94a3b8; margin-bottom: 20px; }
        .modal strong { color: var(--ouro); }

        #confete { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 101; }
        .rodape { margin-top: 12px; font-size: .7rem; color: #64748b; text-align: center; }

        /* ESTILO DA IMAGEM DO RODAPÉ */
        .imagem-rodape {
            margin-top: 15px;
            max-width: 100%;
            width: 300px;
            height: auto;
            border-radius: 8px;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>✦ Quebra Cabeça - Helenio ✦</h1></header>

    <div class="controles">
        <div class="linha">
            <select id="dif">
                <option value="3">Fácil (3×3)</option>
                <option value="4" selected>Médio (4×4)</option>
                <option value="5">Difícil (5×5)</option>
            </select>
            <button id="btn-novo" class="btn-ouro">🎲 Novo Jogo</button>
        </div>
        <div class="linha">
            <div class="upload">
                <button style="width:100%">📁 Sua Imagem</button>
                <input type="file" id="up" accept="image/*">
            </div>
            <button id="btn-resolver" class="btn-resolver">🧠 Resolver</button>
        </div>
    </div>

    <div class="status">
        <div>Movimentos: <span id="mov">0</span></div>
        <div>Status: <span id="st">Em jogo</span></div>
    </div>

    <div id="area"><div id="tab"></div></div>
</div>

<div class="rodape">Peças numeradas • Clique na peça ao lado do espaço vazio</div>

<!-- IMAGEM INSERIDA NO RODAPÉ -->
<img src="https://i.ibb.co/j9X6VG9B/image.png" alt="Imagem Rodapé" class="imagem-rodape">

<div class="modal" id="modal">
    <div class="cx">
        <h2>🏆 Parabéns!</h2>
        <p>Você resolveu em <strong id="fmov">0</strong> movimentos.</p>
        <button id="btn-jogar" class="btn-ouro" style="width:100%">🔄 Jogar Novamente</button>
    </div>
</div>

<canvas id="confete"></canvas>

<script>
let N = 4, T = N*N;
let estado = [];
let mov = 0;
let jogando = false;
let ocupado = false;
let img = '';
let temImg = false;

const tab = document.getElementById('tab');
const elMov = document.getElementById('mov');
const st = document.getElementById('st');
const dif = document.getElementById('dif');
const btnNovo = document.getElementById('btn-novo');
const btnResolver = document.getElementById('btn-resolver');
const up = document.getElementById('up');
const modal = document.getElementById('modal');
const fmov = document.getElementById('fmov');
const btnJogar = document.getElementById('btn-jogar');
const cv = document.getElementById('confete');
const ctx = cv.getContext('2d');

const AC = new (window.AudioContext||window.webkitAudioContext)();
function som(f,tipo='sine',d=.08,v=.12){
    try{
        if(AC.state==='suspended') AC.resume();
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type=tipo;o.frequency.value=f;
        const t=AC.currentTime;
        g.gain.setValueAtTime(v,t);
        g.gain.exponentialRampToValueAtTime(.0001,t+d);
        o.start(t);o.stop(t+d+.02);
    }catch(e){}
}
const sMov=()=>som(540);
const sRes=()=>{som(660,'triangle',.08);setTimeout(()=>som(880,'triangle',.12),90);};
const sVit=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>som(f,'triangle',.22,.15),i*130));
const sErr=()=>som(160,'sawtooth',.14,.08);

const IMG_INI = 'https://picsum.photos/seed/helenio-final/600/600';
function carregarImg(url){
    img = url; temImg = false;
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => { temImg = true; reset(); };
    im.onerror = () => { temImg = false; reset(); };
    im.src = url;
}

function redimC(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }

function inicio(){
    redimC();
    window.addEventListener('resize', redimC);
    carregarImg(IMG_INI);
}
function reset(){
    mov = 0; elMov.textContent = '0';
    st.textContent = 'Em jogo'; st.className = '';
    jogando = true; ocupado = false;
    btnResolver.disabled = false;
    btnResolver.classList.remove('ocupado');
    btnResolver.textContent = '🧠 Resolver';
    embaralha();
    desenha();
}

function embaralha(){
    estado = Array.from({length:T},(_,i)=>i);
    let v = T-1;
    const qtd = N===3 ? 120 : N===4 ? 300 : 600;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    let ult = -1;
    for(let i=0;i<qtd;i++){
        const rv=Math.floor(v/N), cv=v%N;
        const op=[];
        for(const [dr,dc] of dirs){
            const nr=rv+dr,nc=cv+dc;
            if(nr<0||nr>=N||nc<0||nc>=N) continue;
            const idx=nr*N+nc;
            if(idx===ult) continue;
            op.push(idx);
        }
        const idx = op[Math.floor(Math.random()*op.length)];
        ult = v;
        [estado[v], estado[idx]] = [estado[idx], estado[v]];
        v = idx;
    }
    if(pronto()) return embaralha();
}
function pronto(){ return estado.every((v,i)=>v===i); }

function desenha(){
    tab.innerHTML = '';
    tab.style.gridTemplateColumns = `repeat(${N},1fr)`;
    tab.style.gridTemplateRows = `repeat(${N},1fr)`;
    const pc = 100/(N-1);

    estado.forEach((val, idx) => {
        const d = document.createElement('div');
        d.className = 'peca';

        if(val === T-1){
            d.classList.add('vazia');
        } else {
            d.setAttribute('data-n', val + 1);

            if(temImg){
                d.style.backgroundImage = `url('${img}')`;
                d.style.backgroundSize = `${N*100}% ${N*100}%`;
                const r=Math.floor(val/N), c=val%N;
                d.style.backgroundPosition = `${c*pc}% ${r*pc}%`;
            } else {
                const h = (val*360/T);
                d.style.background = `linear-gradient(135deg,hsl(${h},70%,55%),hsl(${(h+40)%360},75%,40%))`;
                d.style.display = 'flex';
                d.style.alignItems = 'center';
                d.style.justifyContent = 'center';
                d.style.fontSize = 'clamp(1rem, 5vw, 1.8rem)';
                d.style.fontWeight = '900';
                d.style.color = '#fff';
                d.style.textShadow = '0 2px 4px #000';
            }
            d.addEventListener('click', () => clica(idx));
        }
        tab.appendChild(d);
    });
}

function clica(idx){
    if(!jogando || ocupado) return;
    const v = estado.indexOf(T-1);
    if(adj(idx,v)){
        move(idx,v,true);
        if(pronto()) vitoriaManual();
    } else sErr();
}
function adj(a,b){
    return Math.abs(Math.floor(a/N)-Math.floor(b/N)) + Math.abs(a%N-b%N) === 1;
}
function move(idxPeca, idxVazio, somar=true, anim=true){
    [estado[idxPeca], estado[idxVazio]] = [estado[idxVazio], estado[idxPeca]];
    if(somar){ mov++; elMov.textContent = mov; if(anim) sMov(); }
    desenha();
    if(anim){
        const el = tab.children[idxVazio];
        if(el){ el.classList.add('mexe'); setTimeout(()=>el.classList.remove('mexe'),140); }
    }
}

function vitoriaManual(){
    jogando = false; ocupado = false;
    btnResolver.disabled = false;
    btnResolver.classList.remove('ocupado');
    st.textContent = '✅ Resolvido!'; st.className = 'ok';
    fmov.textContent = mov;
    sVit();
    setTimeout(()=>{ modal.style.display='flex'; confete(); }, 350);
}

btnResolver.addEventListener('click', async () => {
    if(!jogando || ocupado) return;
    if(pronto()) return;

    ocupado = true;
    btnResolver.disabled = true;
    btnResolver.classList.add('ocupado');
    btnResolver.textContent = '🔮 Calculando...';
    st.textContent = 'Resolvendo...'; st.className = 'res';
    sRes();

    const passos = N === 3 ? await bfs() : await guloso();

    btnResolver.textContent = `✨ Movendo...`;
    await animar(passos);
    await ajusteFinal();
    finalizarResolucao();
});

async function bfs(){
    const ini = estado.join(',');
    const alvo = Array.from({length:T},(_,i)=>i).join(',');
    if(ini===alvo) return [];

    const fila = [{ arr: [...estado], cam: [], v: estado.indexOf(T-1) }];
    const vis = new Set([ini]);
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    let cont = 0;

    while(fila.length){
        cont++;
        if(cont%2000===0) await new Promise(r=>setTimeout(r,0));
        const {arr,cam,v} = fila.shift();
        const rv=Math.floor(v/N), cv=v%N;
        for(const [dr,dc] of dirs){
            const nr=rv+dr, nc=cv+dc;
            if(nr<0||nr>=N||nc<0||nc>=N) continue;
            const idx = nr*N+nc;
            const narr = [...arr];
            [narr[v], narr[idx]] = [narr[idx], narr[v]];
            const ch = narr.join(',');
            if(vis.has(ch)) continue;
            vis.add(ch);
            const ncam = [...cam, idx];
            if(ch===alvo) return ncam;
            fila.push({ arr:narr, cam:ncam, v:idx });
        }
    }
    return [];
}

async function guloso(){
    const LIM = N===4 ? 2500 : 6000;
    const vis = new Map();
    const cam = [];
    let arr = [...estado];
    let v = arr.indexOf(T-1);
    let ult = -1;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

    for(let t=0; t<LIM; t++){
        if(t%500===0) await new Promise(r=>setTimeout(r,0));
        if(arr.every((x,i)=>x===i)) return cam;
        const ch = arr.join(',');
        const h = H(arr);

        const ant = vis.get(ch);
        if(ant !== undefined && ant <= h){
            const op=[];
            const rv=Math.floor(v/N), cv=v%N;
            for(const [dr,dc] of dirs){
                const nr=rv+dr,nc=cv+dc;
                if(nr<0||nr>=N||nc<0||nc>=N) continue;
                const id=nr*N+nc; if(id===ult) continue;
                op.push(id);
            }
            if(!op.length) break;
            const id = op[Math.floor(Math.random()*op.length)];
            cam.push(id); ult=v;
            [arr[v],arr[id]]=[arr[id],arr[v]]; v=id;
            continue;
        }
        vis.set(ch, h);

        const rv=Math.floor(v/N), cv=v%N;
        const op=[];
        for(const [dr,dc] of dirs){
            const nr=rv+dr,nc=cv+dc;
            if(nr<0||nr>=N||nc<0||nc>=N) continue;
            const id=nr*N+nc; if(id===ult) continue;
            op.push(id);
        }
        let mh=Infinity, mi=op[0], emp=[];
        for(const id of op){
            [arr[v],arr[id]]=[arr[id],arr[v]];
            const hh=H(arr);
            [arr[v],arr[id]]=[arr[id],arr[v]];
            if(hh<mh){ mh=hh; mi=id; emp=[id]; }
            else if(hh===mh) emp.push(id);
        }
        const esc = emp.length>1 ? emp[Math.floor(Math.random()*emp.length)] : mi;
        cam.push(esc); ult=v;
        [arr[v],arr[esc]]=[arr[esc],arr[v]]; v=esc;
    }
    return cam;
}

function H(arr){
    let h=0;
    for(let i=0;i<T;i++){
        const v=arr[i]; if(v===T-1) continue;
        h += Math.abs(Math.floor(i/N)-Math.floor(v/N)) + Math.abs(i%N-v%N);
    }
    return h;
}

async function ajusteFinal(){
    let tent = 0;
    while(!pronto() && tent < 1500){
        tent++;
        const v = estado.indexOf(T-1);
        const rv=Math.floor(v/N), cv=v%N;
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        let mh=Infinity, mi=null;
        for(const [dr,dc] of dirs){
            const nr=rv+dr,nc=cv+dc;
            if(nr<0||nr>=N||nc<0||nc>=N) continue;
            const idx=nr*N+nc;
            [estado[v],estado[idx]]=[estado[idx],estado[v]];
            const h=H(estado);
            [estado[v],estado[idx]]=[estado[idx],estado[v]];
            if(h<mh){ mh=h; mi=idx; }
        }
        if(mi==null) break;
        move(mi, v, true, true);
        await new Promise(r=>setTimeout(r, 45));
    }
}

async function animar(passos){
    const vel = N===3 ? 90 : N===4 ? 65 : 45;
    for(const idxPeca of passos){
        if(pronto()) break;
        const v = estado.indexOf(T-1);
        if(!adj(idxPeca, v)) continue;
        move(idxPeca, v, true, true);
        await new Promise(r=>setTimeout(r, vel));
    }
}

function finalizarResolucao(){
    jogando = false;
    ocupado = false;
    btnResolver.disabled = false;
    btnResolver.classList.remove('ocupado');
    btnResolver.textContent = '🧠 Resolver';
    st.textContent = '✅ Imagem formada! Clique em Novo Jogo';
    st.className = 'ok';
    desenha();
    sVit();
    confete();
}

dif.addEventListener('change', (e) => {
    N = parseInt(e.target.value);
    T = N*N;
    reset();
});

btnNovo.addEventListener('click', reset);

up.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if(f){
        const r = new FileReader();
        r.onload = (ev) => carregarImg(ev.target.result);
        r.readAsDataURL(f);
    }
});

btnJogar.addEventListener('click', () => {
    modal.style.display = 'none';
    reset();
});

function confete(){
    let p = Array.from({length:80},()=>({
        x: Math.random()*cv.width,
        y: Math.random()*cv.height - cv.height,
        v: 2 + Math.random()*4,
        s: 4 + Math.random()*6,
        c: `hsl(${Math.random()*360},90%,60%)`
    }));
    let f = 0;
    function anim(){
        ctx.clearRect(0,0,cv.width,cv.height);
        p.forEach(k => {
            ctx.fillStyle = k.c;
            ctx.fillRect(k.x, k.y, k.s, k.s);
            k.y += k.v;
            if(k.y > cv.height) k.y = -10;
        });
        if(f++ < 180) requestAnimationFrame(anim);
        else ctx.clearRect(0,0,cv.width,cv.height);
    }
    anim();
}

inicio();
</script>
</body>
</html>
